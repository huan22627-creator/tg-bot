name: Bot

on:
  schedule:
    - cron: '12 0 * * *'
    - cron: '18 4 * * *'
    - cron: '30 7 * * *'
    - cron: '45 10 * * *'
    - cron: '0 13 * * *'
    - cron: '15 15 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      SENDKEY: ${{ secrets.SENDKEY }}
  
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python bot.py
